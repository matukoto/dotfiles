name: aqua-update-checksum

"on":
  pull_request:

jobs:
  update-checksum:
    if: contains(github.head_ref, 'renovate')
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.app-token.outputs.token }}
      - uses: aquaproj/aqua-installer@7053e18161e62dffa977457ced6cd24d6c3dda24 # v4.1.1
        with:
          aqua_version: v2.60.1
        env:
          AQUA_CONFIG: config/aqua/aqua.yaml
      - uses: aquaproj/update-checksum-action@c5df5a5c2a897a9b807068f062140506d092e7ac # v0.2.7
        with:
          prune: true
          working_directory: config/aqua
          github_token: ${{ steps.app-token.outputs.token }}
