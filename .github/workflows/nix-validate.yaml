name: nix-validate
on:
  push:
    paths:
      - .github/workflows/nix-validate.yaml
      - flake.nix
      - flake.lock
      - config/**
      - home/**
      - run/**
      - setting/**
      - windows/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux-home-manager:
    name: linux-home-manager
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Build Linux Home Manager output
        run: nix build .#homeConfigurations.linux.activationPackage --no-link

      - name: Validate Linux Home Manager activation script
        run: |
          nix --extra-experimental-features "nix-command flakes" run .#home-manager -- --help

  darwin-system:
    name: darwin-system
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Build nix-darwin output
        run: nix build .#darwinConfigurations.darwin.config.system.build.toplevel --no-link
